# cargo-deny configuration — license and supply-chain guard.
# Enforces that all dependencies use permissive licenses (clean-room policy:
# no GPL code in the tree) and come from known sources.

[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
    "MPL-2.0",
    "CC0-1.0",
    # Font licenses pulled in by epaint_default_fonts (egui/eframe default fonts)
    "OFL-1.1",
    "Ubuntu-font-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
