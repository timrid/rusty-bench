name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Native build, test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (eframe/egui)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        # rb-gui-web is wasm-only; exclude it from native compilation
        run: cargo clippy --workspace --all-targets --exclude rb-gui-web
      - name: Test
        run: cargo test --workspace --exclude rb-gui-web
      - name: Test native acquisition runtime (rb-core `native` feature)
        run: cargo test -p rb-core --features native

  wasm:
    name: Web (WASM) build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Assert pure crates compile to wasm with no features
        run: cargo build -p rb-model -p rb-device -p rb-transport -p rb-core --target wasm32-unknown-unknown
      - name: Assert rb-core web spawner compiles to wasm
        run: cargo build -p rb-core --features web --target wasm32-unknown-unknown
      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest
      - name: Build web GUI
        working-directory: crates/rb-gui-web
        run: trunk build

  deny:
    name: License & supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans sources
